#:schema node_modules/wrangler/config-schema.json
name = "dhaka-logistic"
type = "nodejs_compat"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build"
cwd = "."

[env.production]
routes = [
  { pattern = "www.dhakalogistic.com", zone_name = "dhakalogistic.com" }
]
compatibility_flags = ["nodejs_compat"]

[env.preview]
compatibility_flags = ["nodejs_compat"]
